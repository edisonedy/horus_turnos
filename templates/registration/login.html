{% extends 'base.html' %}
{% block title %}Ingresar - HORUS TURNOS{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 mt-5">
            <div class="card-body p-4">
                <h1 class="h4 mb-1">Ingresar</h1>
                <p class="text-muted">Panel administrativo mínimo.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-horus w-100" type="submit">Entrar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
